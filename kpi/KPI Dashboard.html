<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KPI Monitoring · Carla Autonomous</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --tile-1: #1a1a1c;     /* canvas */
    --tile-2: #2a2a2c;     /* card */
    --tile-3: #323234;     /* nested */
    --tile-4: #3a3a3c;     /* hover */
    --hairline: rgba(255,255,255,0.08);
    --hairline-strong: rgba(255,255,255,0.14);
    --primary: #0066cc;
    --primary-on-dark: #2997ff;
    --body: #f5f5f7;
    --body-muted: #cccccc;
    --body-dim: #86868b;
    --warning: #ff9f0a;     /* iOS system orange */
    --critical: #ff453a;    /* iOS system red */
    --good: #30d158;        /* iOS system green */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--tile-1);
    color: var(--body);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.44;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }
  body { min-height: 100vh; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .tnum { font-variant-numeric: tabular-nums; }
  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
</style>
<script type="application/json" id="__tweaks_defaults">
{}
</script>
</head>
